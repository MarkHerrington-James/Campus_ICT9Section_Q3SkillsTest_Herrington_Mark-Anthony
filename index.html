<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Q3 Skills Test</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
background-attachment:fixed;
font-family:'Segoe UI',sans-serif;
color:white;
min-height:100vh;
margin:0;
}

/* NAVBAR */

.header-nav{
background:rgba(10,15,25,0.9);
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
font-size:15px;
}

/* REG CARD */

.reg-card{
background:rgba(56,143,163,0.55);
backdrop-filter:blur(12px);
border-radius:15px;
max-width:900px;
margin:50px auto;
padding:40px;
display:flex;
gap:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* LEFT PROFILE */

.profile-side{
flex:1;
text-align:center;
border-right:1px solid rgba(255,255,255,0.2);
padding-right:30px;
}

.profile-circle{
width:150px;
height:150px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
margin-bottom:15px;
}

/* RIGHT FORM */

.form-side{
flex:1.5;
}

.form-control{
background:#f8f9fa;
border:none;
font-size:14px;
margin-bottom:10px;
}

label{
font-size:13px;
color:#00e5ff;
margin-bottom:3px;
display:block;
}

/* BUTTONS */

.btn-cyan{
background:#00d8ff;
border:none;
color:black;
font-weight:bold;
padding:10px;
width:100%;
border-radius:6px;
}

.btn-cyan:hover{
background:#00c3e6;
}

.btn-white{
background:white;
border:none;
padding:10px;
margin-top:8px;
width:100%;
border-radius:6px;
}

/* FOOTER */

footer{
background:rgba(0,0,0,0.85);
position:fixed;
bottom:0;
width:100%;
text-align:center;
padding:10px;
font-size:14px;
}

</style>
</head>

<body>

<header class="header-nav">

<div>
<span class="me-3">Home</span>
<span class="me-3">Fare Matrix</span>
<span class="me-3">Schedule</span>
<span>Help</span>
</div>

<div>
<span class="me-3">Book Now</span>
<button class="btn btn-primary btn-sm">Create Account</button>
</div>

</header>


<div class="reg-card">

<!-- LEFT SIDE -->

<div class="profile-side">

<img src="https://via.placeholder.com/150"
id="display_image"
class="profile-circle">

<input type="file"
id="image_input"
accept="image/*"
class="form-control">

<button class="btn-cyan mt-2" onclick="uploadConfirm()">Upload Photo</button>

</div>


<!-- RIGHT SIDE -->

<div class="form-side">

<h2 style="font-family:serif;font-weight:bold;">REGISTRATION</h2>
<p style="font-size:12px;">Instructions: Fill out required fields</p>

<form>

<label>First Name</label>
<input type="text" class="form-control">

<label>Last Name</label>
<input type="text" class="form-control">

<div class="row g-2">

<div class="col-3">
<label>Age</label>
<input type="number" class="form-control">
</div>

<div class="col-9">
<label>Contact Number</label>
<input type="text" class="form-control">
</div>

</div>

<label>Email</label>
<input type="email" class="form-control">

<label>Username</label>
<input type="text" class="form-control">

<label>Password</label>
<input type="password" class="form-control">

<div class="form-check my-2">

<input class="form-check-input" type="checkbox" id="terms">

<label class="form-check-label text-white" style="font-size:11px;">
I accept the 
<a href="https://www.w3schools.com" style="color:#00e5ff;">Terms of Use</a>
</label>

</div>

<button type="button" class="btn-cyan" onclick="registerAlert()">
Create my account
</button>

<button type="reset" class="btn-white">
Cancel
</button>

</form>

</div>

</div>

<footer>

Student Name | Grade & Section © 2026

</footer>

<script>

/* IMAGE PREVIEW */

const image_input = document.querySelector("#image_input");

image_input.addEventListener("change", function(){

const reader = new FileReader();

reader.addEventListener("load", function(){

document.querySelector("#display_image").src = reader.result;

});

reader.readAsDataURL(this.files[0]);

});

/* ALERTS */

function uploadConfirm(){
alert("Your profile picture has been uploaded!");
}

function registerAlert(){

const terms = document.getElementById("terms");

if(!terms.checked){

alert("Please accept the Terms of Use first.");
return;

}

alert("Registration Successful!");

}

</script>

</body>
</html>
